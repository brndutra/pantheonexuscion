<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>Card Component</title>

<style>

/* BASE */

body{
background:#050505;
font-family:Arial;
padding:40px;
color:#ddd;
}

/* CARD */

.card{
border:1px solid #333;
background:#0b0b0b;
border-radius:12px;
box-shadow:0 4px 20px rgba(0,0,0,0.5);
color:#ddd;
}

/* HEADER */

.card-header{
display:flex;
flex-direction:column;
gap:6px;
padding:24px;
border-bottom:1px solid #222;
}

/* TITLE */

.card-title{
font-weight:600;
font-size:16px;
letter-spacing:0.5px;
}

/* DESCRIPTION */

.card-description{
font-size:13px;
color:#888;
}

/* CONTENT */

.card-content{
padding:24px;
padding-top:0;
}

/* FOOTER */

.card-footer{
display:flex;
align-items:center;
padding:24px;
padding-top:0;
border-top:1px solid #222;
}

</style>

</head>


<body>


<div class="card">

<div class="card-header">

<div class="card-title">
Presence Profile
</div>

<div class="card-description">
Character appearance information
</div>

</div>


<div class="card-content">

<p>
Height: 1.80m
</p>

<p>
Eye Color: Blue
</p>

</div>


<div class="card-footer">

<button>Save</button>

</div>

</div>


</body>
</html>
