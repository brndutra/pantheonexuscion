<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>Pantheonexus Scion Sheet</title>

<link rel="stylesheet" href="css/style.css">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

</head>

<body>

<div class="container">

<h2 class="section-title">// PERSONAL PROFILES</h2>


<div class="profiles-grid">

<!-- AVATAR -->

<div class="card">

<div class="avatar-box">
NO VISUAL DATA
</div>

<div class="character-name">
VALERIE HASTINGS
</div>

<div class="pantheon">
DIVINITATES
</div>

</div>


<!-- PRESENCE -->

<div class="card">

<div class="card-header">Presence Profile</div>

<input placeholder="Height">
<input placeholder="Eye Color">
<input placeholder="Hair Color">
<input placeholder="Aura Signature">
<input placeholder="Scent / Essence">

</div>


<!-- PSYCHIC -->

<div class="card">

<div class="card-header">Psychic Profile</div>

<textarea placeholder="Deep Analysis"></textarea>

<input placeholder="Major Arcana">
<input placeholder="Temperament">

<textarea placeholder="Psychological Notes"></textarea>

</div>


<!-- IDENTITY -->

<div class="card">

<div class="card-header">Identity</div>

<input placeholder="Character Name">

<input placeholder="Pantheon">
<input placeholder="Divine Parent">

<input placeholder="City of Origin">
<input placeholder="Region">

</div>


<!-- CALLINGS -->

<div class="card">

<div class="card-header">Divine Callings</div>

<label>Calling 1</label>
<div class="dots"></div>

<label>Calling 2</label>
<div class="dots"></div>

<label>Calling 3</label>
<div class="dots"></div>

</div>


<!-- VIRTUES -->

<div class="card">

<div class="card-header">Virtue Matrix</div>

<label>Valor</label>
<div class="dots"></div>

<label>Harmony</label>
<div class="dots"></div>

<label>Order</label>
<div class="dots"></div>

<label>Piety</label>
<div class="dots"></div>

</div>


</div>

</div>

<script src="js/script.js"></script>

</body>
</html>
