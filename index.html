<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ficha Scion - Mínima</title>
    <script type="module" src="/src/main.tsx"></script>
    <style>
      :root {
        --bg: #0b0d12;
        --panel: #141923;
        --panel-2: #1b2230;
        --text: #eef2ff;
        --muted: #9aa4b2;
        --line: #2a3447;
        --accent: #d4af37;
        --danger: #d9534f;
      }

      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Inter, system-ui, sans-serif;
        background: linear-gradient(180deg, #0b0d12 0%, #111827 100%);
        color: var(--text);
      }

      button, input, textarea, select {
        font: inherit;
      }

      .app {
        max-width: 1200px;
        margin: 0 auto;
        padding: 24px;
      }

      .title {
        font-size: 28px;
        font-weight: 800;
        margin: 0 0 8px;
      }

      .subtitle {
        color: var(--muted);
        margin: 0 0 24px;
      }

      .grid {
        display: grid;
        gap: 16px;
      }

      .grid-2 {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .grid-3 {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      @media (max-width: 900px) {
        .grid-2, .grid-3 {
          grid-template-columns: 1fr;
        }
      }

      .card {
        background: rgba(20, 25, 35, 0.92);
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 16px;
        box-shadow: 0 10px 24px rgba(0,0,0,0.22);
      }

      .card h2 {
        margin: 0 0 16px;
        font-size: 18px;
        color: var(--accent);
      }

      .field {
        display: grid;
        gap: 6px;
        margin-bottom: 12px;
      }

      .field label {
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--muted);
      }

      .field input, .field textarea {
        width: 100%;
        background: var(--panel-2);
        border: 1px solid var(--line);
        color: var(--text);
        border-radius: 10px;
        padding: 10px 12px;
      }

      .row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 10px 0;
        border-bottom: 1px solid rgba(255,255,255,0.06);
      }

      .row:last-child { border-bottom: none; }

      .name {
        font-weight: 600;
      }

      .muted {
        color: var(--muted);
        font-size: 13px;
      }

      .stepper {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .stepper button, .actions button {
        background: var(--panel-2);
        border: 1px solid var(--line);
        color: var(--text);
        border-radius: 10px;
        padding: 8px 12px;
        cursor: pointer;
      }

      .stepper span {
        min-width: 24px;
        text-align: center;
        font-weight: 700;
      }

      .actions {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        margin-top: 20px;
      }

      .actions .primary {
        border-color: #8a6d1d;
        background: #2a2210;
        color: #f3d77a;
      }

      .actions .danger {
        border-color: #5b2422;
        background: #281313;
        color: #ff9f9b;
      }

      .health-track {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .health-box {
        width: 38px;
        height: 38px;
        border-radius: 10px;
        border: 1px solid var(--line);
        background: var(--panel-2);
        color: var(--text);
        display: grid;
        place-items: center;
        cursor: pointer;
        font-weight: 800;
      }

      .health-box[data-state="0"] { background: var(--panel-2); }
      .health-box[data-state="1"] { background: #3a2d17; color: #f3d77a; }
      .health-box[data-state="2"] { background: #41201f; color: #ffb2ae; }
      .health-box[data-state="3"] { background: #5a0f0f; color: #fff; }

      .small {
        font-size: 12px;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
